# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=jcroql
version: 2

project_name: crx3

snapshot:
  version_template: "0.0.0-{{ .Timestamp }}"

before:
  hooks:
    - go mod tidy
    - rm -rf completions manpages
    - mkdir -p completions manpages
    - sh -c 'go run ./crx3 completion bash > ./completions/crx3.bash 2>/dev/null || true'
    - sh -c 'go run ./crx3 completion zsh > ./completions/crx3.zsh 2>/dev/null || true'
    - sh -c 'go run ./crx3 completion fish > ./completions/crx3.fish 2>/dev/null || true'
    - sh -c 'go run ./crx3 man | gzip -c > ./manpages/crx3.1.gz 2>/dev/null || true'

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
      - freebsd
      - openbsd
      - netbsd
      - android
    goarch:
      - amd64
      - arm64
      - "386"
      - arm
    goarm:
      - "7"
    ignore:
      - goos: android
        goarch: amd64
      - goos: android
        goarch: arm
      - goos: android
        goarch: "386"
      - goos: windows
        goarch: arm
    flags:
      - -trimpath

archives:
  - id: crx3-archive
    ids:
      - crx3-cli
    name_template: >-
      crx3_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}
    wrap_in_directory: true
    files:
      - README*
      - LICENSE*
      - manpages/*
      - completions/*
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

brews:
  - repository:
      owner: mmadfox
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    skip_upload: "{{ .Prerelease }}"
    commit_author:
      name: "Sergey Liskonog"
      email: "mmadfox@users.noreply.github.com"
    directory: Formula
    homepage: "https://github.com/mmadfox/go-crx3"
    description: "Chrome extension tooling: pack, unpack, download CRX3 extensions"
    license: "Apache-2.0"
    test: |
      system "#{bin}/crx3 version"
    extra_install: |-
      bash_completion.install "completions/crx3.bash" => "crx3"
      zsh_completion.install "completions/crx3.zsh" => "_crx3"
      fish_completion.install "completions/crx3.fish"
      man1.install "manpages/crx3.1.gz" if File.exist?("manpages/crx3.1.gz")

nfpms:
  - id: crx3-packages
    package_name: go-crx3
    file_name_template: "{{ .ConventionalFileName }}"
    formats:
      - apk
      - deb
      - rpm
    vendor: "mmadfox"
    homepage: "https://github.com/mmadfox/go-crx3"
    maintainer: "Sergey Liskonog <mmadfox@users.noreply.github.com>"
    description: "Chrome extension tooling: pack, unpack, download CRX3 extensions"
    license: "Apache-2.0"
    dependencies:
      - bash-completion