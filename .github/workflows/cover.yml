name: Quality
on: [push, pull_request]
jobs:
  test:
    name: Test with Coverage
    runs-on: ubuntu-latest
    steps:
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache: true
    - name: Check out code
      uses: actions/checkout@v4
    - name: Install dependencies
      run: go mod download
    - name: Run Unit tests
      run: |
        go test -race -covermode atomic -coverprofile=covprofile $(go list ./... | grep -v '/examples\|/pb|/commands')
    - name: Install goveralls
      run: go install github.com/mattn/goveralls@latest
    - name: Send coverage
      env:
        COVERALLS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if [ -f covprofile ]; then
          goveralls -coverprofile=covprofile -service=github
        else
          echo "Warning: covprofile not found, skipping coverage report"
        fi
